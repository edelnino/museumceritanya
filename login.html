<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum | Login</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <a href="index.html" class="back-link">← Back to Home</a>
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your account.</p>
            </div>
            <form id="login-form" class="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="e.g. artlover@museum.com">
                    <span class="error-message" id="email-error"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                    <span class="error-message" id="password-error"></span>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary w-100">Sign In</button>
            </form>
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Create account</a></p>
            </div>
        </div>
        <div class="login-image">
            <img src="assets/images/art3.png" alt="Museum Art">
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
